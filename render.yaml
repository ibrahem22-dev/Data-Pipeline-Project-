# Render Blueprint — deploys all three services from a single file.
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined here:
#   weather-api       →  FastAPI REST API      (port assigned by Render via $PORT)
#   weather-dashboard →  Streamlit dashboard   (port assigned by Render via $PORT)
#   weather-db        →  PostgreSQL 18         (internal connection only)

services:

  # ── FastAPI REST API ────────────────────────────────────────────────────────
  - type: web
    name: weather-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /           # Render hits GET / to confirm the service is up
    autoDeploy: false            # Deploys are triggered by GitHub Actions, not Render auto-deploy
    envVars:
      - key: DATABASE_URL
        # Render injects the internal connection string automatically from weather-db
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false              # You set this manually in the Render dashboard

  # ── Streamlit dashboard ─────────────────────────────────────────────────────
  - type: web
    name: weather-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false

# ── PostgreSQL database ───────────────────────────────────────────────────────
databases:
  - name: weather-db
    plan: free                   # Free tier: 256 MB RAM, 1 GB storage, expires after 90 days
    databaseName: weather_pipeline
    user: weather_user
    # No ipAllowList entry = accessible only from internal Render services (secure default)
  